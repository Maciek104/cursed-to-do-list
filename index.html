<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cursed To-Do List</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>Cursed To-Do List</h1>
        </header>

        <div class="gradient-top">
            <div class = "actions-container">
                <input type="text" id="searchBar" placeholder="Wyszukaj zadanie...">
                <button id="sortDateButton">Sortuj po dacie</button>
                <button id="sortTitleButton">Sortuj po tytule</button>
            </div>
        </div>

        <section class="todo-section">

            <ul id="taskList"></ul>
            
            <section class="row">
                <input type="text" id="taskInput" placeholder="Dodaj nowe zadanie...">
                <input type="date" id="dateInput">
            </section>
            <input type="text" id="descriptionInput" placeholder="Opis zadania...">
            <button id="addButton">Dodaj</button>
        </section>
        
        <div class="center">
            <footer>
                <p>&copy; 2026 Cursed To-Do List. Wszelkie prawa zastrzeżone.</p>
                <p>Projekt i wykonanie: Maciek104</p>
            </footer>
        </div>
>
        <section class="polaroid-container">
            <div class="left-align">
                <div class="polaroid-lr">
                    <img src="assets/images/image_000.jpg" alt="image">
                    <p>Nawiedzony dom</p>
                </div>
            </div>
            <div class="right-align">
                <div class="polaroid-rr">
                    <img src="assets/images/image_001.jpg" alt="image">
                    <p>Znaleźliśmy to w domu</p>
                </div>
            </div>
            <div class="left-align">
                <div class="polaroid-lr">
                    <img src="assets/images/image_002.jpg" alt="image">
                    <p>To zostawiło ślad...</p>
                </div>
            </div>
        </section>
    </body>

    <script src="script.js"></script>
</html>
